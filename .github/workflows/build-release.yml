name: Build Production EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject images from secrets
        shell: pwsh
        run: |
          if ($env:BACKGROUND_PNG) {
            [System.IO.File]::WriteAllBytes(
              "LegacyUpdater/Resources/background.png",
              [System.Convert]::FromBase64String($env:BACKGROUND_PNG)
            )
            Write-Host "background.png injetado com sucesso."
          } else {
            Write-Warning "Secret BACKGROUND_PNG nao encontrado — usando placeholder."
          }
          if ($env:ICON_ICO) {
            [System.IO.File]::WriteAllBytes(
              "LegacyUpdater/Resources/icon.ico",
              [System.Convert]::FromBase64String($env:ICON_ICO)
            )
            Write-Host "icon.ico injetado com sucesso."
          } else {
            Write-Warning "Secret ICON_ICO nao encontrado — usando placeholder."
          }
        env:
          BACKGROUND_PNG: ${{ secrets.BACKGROUND_PNG }}
          ICON_ICO: ${{ secrets.ICON_ICO }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore LegacyUpdater.sln

      - name: Build Release
        run: msbuild LegacyUpdater.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LegacyUpdater
          path: LegacyUpdater/bin/Release/LegacyUpdater.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LegacyUpdater/bin/Release/LegacyUpdater.exe
